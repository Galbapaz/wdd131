<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Submit a product review by selecting a product, rating it, choosing useful features, and sharing your feedback.">
  <meta name="author" content="Gabriel Alba">
  <title>Product Review</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/form.js" defer></script>
</head>
<body>
  <header class="site-header">
    <h1>Product Review</h1>
  </header>

  <main>
    <section class="form-wrapper">
      <form method="get" action="review.html" class="review-form">
        
        <div class="form-group">
          <label for="productName">Product Name</label>
          <select id="productName" name="productName" required>
            <option value="" disabled selected>Select a Product...</option>
          </select>
        </div>

        <fieldset class="form-group rating-group">
          <legend>Overall Rating</legend>
          <div class="rating-options">
            <div class="rating-option">
              <label for="rating1">☆</label>
              <input type="radio" id="rating1" name="overallRating" value="1" required>
            </div>

            <div class="rating-option">
              <label for="rating2">☆☆</label>
              <input type="radio" id="rating2" name="overallRating" value="2" required>
            </div>

            <div class="rating-option">
              <label for="rating3">☆☆☆</label>
              <input type="radio" id="rating3" name="overallRating" value="3" required>
            </div>

            <div class="rating-option">
              <label for="rating4">☆☆☆☆</label>
              <input type="radio" id="rating4" name="overallRating" value="4" required>
            </div>

            <div class="rating-option">
              <label for="rating5">☆☆☆☆☆</label>
              <input type="radio" id="rating5" name="overallRating" value="5" required>
            </div>
          </div>
        </fieldset>

        <div class="form-group">
          <label for="installDate">Date of Installation</label>
          <input type="date" id="installDate" name="installDate" required>
        </div>

        <fieldset class="form-group features-group">
          <legend>Which features did you find useful in the product? <span class="helper-text">(Check all that apply)</span></legend>

          <div class="checkbox-item">
            <input type="checkbox" id="durability" name="features" value="Durability">
            <label for="durability">Durability</label>
          </div>

          <div class="checkbox-item">
            <input type="checkbox" id="easeOfUse" name="features" value="Ease of Use">
            <label for="easeOfUse">Ease of Use</label>
          </div>

          <div class="checkbox-item">
            <input type="checkbox" id="performance" name="features" value="Performance">
            <label for="performance">Performance</label>
          </div>

          <div class="checkbox-item">
            <input type="checkbox" id="design" name="features" value="Design">
            <label for="design">Design</label>
          </div>
        </fieldset>

        <div class="form-group">
          <label for="writtenReview">Written Review <span class="helper-text">(Optional)</span></label>
          <textarea id="writtenReview" name="writtenReview" rows="6"></textarea>
        </div>

        <div class="form-group">
          <label for="userName">Your Name <span class="helper-text">(Optional)</span></label>
          <input type="text" id="userName" name="userName">
        </div>

        <div class="form-group">
          <input type="submit" value="Post Review" class="submit-button">
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy;<span id="currentYear"></span> Gabriel Alba | Bolivia</p>
    <p id="lastModified"></p>
  </footer>
</body>
</html>
