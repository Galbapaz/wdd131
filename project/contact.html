<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact page for English Learning Hub.">
  <meta name="author" content="Gabriel Alba">
  <title>English Learning Hub | Contact</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/project.css">
  <script src="scripts/project.js" defer></script>
</head>
<body>

  <header>
    <div class="header-container">
      <a href="index.html" class="logo">English Learning Hub</a>

      <button id="menu-button" aria-label="Open navigation menu" aria-expanded="false">
        ☰
      </button>

      <nav id="main-nav">
        <a href="index.html">Home</a>
        <a href="resources.html">Resources</a>
        <a href="tips.html">Study Tips</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="siteplan.html">Site Plan</a>
        <a href="references.html">References</a>
        
      </nav>
    </div>
  </header>

  <main>
    <section class="page-banner">
      <h1>Contact</h1>
      <p>Tell us how you like to practice English.</p>
    </section>

    <section class="content-section form-section">
      <h2>Student Form</h2>

      <form id="contact-form" action="#" method="get">
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" name="full-name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="skill">Favorite English Skill</label>
        <select id="skill" name="skill" required>
          <option value="">Select one option</option>
          <option value="Vocabulary">Vocabulary</option>
          <option value="Listening">Listening</option>
          <option value="Speaking">Speaking</option>
          <option value="Grammar">Grammar</option>
        </select>

        <fieldset>
          <legend>How often do you study English?</legend>

          <label>
            <input type="radio" name="frequency" value="Every day" required>
            Every day
          </label>

          <label>
            <input type="radio" name="frequency" value="A few times a week">
            A few times a week
          </label>

          <label>
            <input type="radio" name="frequency" value="Sometimes">
            Sometimes
          </label>
        </fieldset>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <input type="submit" value="Send Information" class="button">
      </form>

      <div id="form-response" class="form-response"></div>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="currentyear"></span> Gabriel Alba | Bolivia</p>
    <p id="lastModified"></p>
    <p><a href="references.html">References</a></p>
  </footer>

</body>
</html>
